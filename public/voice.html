<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>walkie</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #101418; color: #e8ecef;
         display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 1.5rem; box-sizing: border-box; }
  h1 { font-size: 1.3rem; letter-spacing: .12em; margin: .5rem 0 1.5rem; }
  h1::before { content: "🎙️ "; }
  #setup, #session { width: 100%; max-width: 30rem; }
  input { width: 100%; padding: .7rem; border-radius: .5rem; border: 1px solid #2c3540; background: #181f26;
          color: inherit; font-size: 1rem; box-sizing: border-box; margin-bottom: .8rem; }
  button { padding: .7rem 1.4rem; border-radius: .5rem; border: none; font-size: 1rem; cursor: pointer; }
  button.primary { background: #3ba55c; color: #fff; width: 100%; }
  button.danger { background: #b3403f; color: #fff; }
  button.ghost { background: #232b33; color: #e8ecef; }
  #status { margin: 1rem 0; font-size: .9rem; color: #9fb0bd; min-height: 1.2em; }
  #orb { width: 7rem; height: 7rem; border-radius: 50%; margin: 1.2rem auto; background: #232b33;
         transition: transform .15s, background .3s; }
  #orb.live { background: #3ba55c; }
  #orb.talking { background: #4f8fd3; transform: scale(1.12); }
  #transcript { width: 100%; max-width: 30rem; font-size: .95rem; line-height: 1.45; color: #c9d4dc;
                white-space: pre-wrap; max-height: 40vh; overflow-y: auto; }
  #approval { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none;
              align-items: center; justify-content: center; }
  #approval.open { display: flex; }
  #approval .card { background: #181f26; border-radius: .8rem; padding: 1.4rem; max-width: 26rem; width: 90%; }
  #approval pre { background: #10161c; padding: .7rem; border-radius: .5rem; overflow-x: auto; font-size: .8rem; }
  #approval .row { display: flex; gap: .8rem; justify-content: flex-end; margin-top: 1rem; }
  #session { display: none; text-align: center; }
</style>
</head>
<body>
<h1>walkie</h1>

<div id="setup">
  <input id="token" type="password" placeholder="Fleet token" autocomplete="current-password" />
  <button class="primary" id="connect">Connect</button>
</div>

<div id="session">
  <div id="orb"></div>
  <div>
    <button class="ghost" id="mute">Mute</button>
    <button class="danger" id="hangup">Hang up</button>
  </div>
  <div id="transcript"></div>
</div>

<div id="status"></div>

<div id="approval">
  <div class="card">
    <strong id="approval-title"></strong>
    <pre id="approval-args"></pre>
    <div class="row">
      <button class="ghost" id="deny">Deny</button>
      <button class="primary" id="approve" style="width:auto">Approve</button>
    </div>
  </div>
</div>

<script>
const CONTROL_TOOLS = new Set(["spawn_worker", "send_to_agent", "reset_orchestrator"]);
const $ = (id) => document.getElementById(id);
const status = (m) => { $("status").textContent = m; };

let token = localStorage.getItem("fleetToken") || "";
$("token").value = token;

// ---------- Minimal MCP client (streamable HTTP, same origin) ----------
let mcpSid = null, mcpId = 0;
async function mcpRequest(method, params) {
  const res = await fetch("/mcp", {
    method: "POST",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json",
      Accept: "application/json, text/event-stream",
      ...(mcpSid ? { "mcp-session-id": mcpSid } : {}),
    },
    body: JSON.stringify({ jsonrpc: "2.0", id: ++mcpId, method, params }),
  });
  if (res.status === 401) throw new Error("Fleet token rejected");
  mcpSid = res.headers.get("mcp-session-id") || mcpSid;
  const text = await res.text();
  const data = text.split("\n").filter((l) => l.startsWith("data: ")).map((l) => JSON.parse(l.slice(6)));
  const reply = data.find((d) => d.id === mcpId);
  if (reply?.error) throw new Error(reply.error.message);
  return reply?.result;
}
async function mcpNotify(method) {
  await fetch("/mcp", {
    method: "POST",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json",
      Accept: "application/json, text/event-stream",
      "mcp-session-id": mcpSid,
    },
    body: JSON.stringify({ jsonrpc: "2.0", method }),
  });
}
async function mcpInit() {
  await mcpRequest("initialize", {
    protocolVersion: "2025-03-26",
    capabilities: {},
    clientInfo: { name: "walkie-voice", version: "0.1" },
  });
  await mcpNotify("notifications/initialized");
  const { tools } = await mcpRequest("tools/list", {});
  return tools;
}

// ---------- Approval gate for control-lane tools ----------
function requestApproval(name, args) {
  return new Promise((resolve) => {
    $("approval-title").textContent = `Allow ${name}?`;
    $("approval-args").textContent = JSON.stringify(args, null, 2);
    $("approval").classList.add("open");
    const close = (ok) => { $("approval").classList.remove("open"); resolve(ok); };
    $("approve").onclick = () => close(true);
    $("deny").onclick = () => close(false);
  });
}

// ---------- Realtime session over WebRTC ----------
let pc, dc, mic;
let logSession = null, turnText = "";
function log(type, data = {}) {
  if (!logSession) return;
  fetch("/voice/log", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ session: logSession, events: [{ type, ...data }] }),
  }).catch(() => {});
}

async function connect() {
  token = $("token").value.trim();
  if (!token) return status("Enter the fleet token first");
  localStorage.setItem("fleetToken", token);

  try {
    status("Loading fleet tools…");
    const tools = await mcpInit();

    status("Minting session key…");
    const sec = await fetch("/voice/secret", {
      method: "POST",
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!sec.ok) throw new Error((await sec.json()).error || `secret endpoint: ${sec.status}`);
    const { value: ephemeral, model } = await sec.json();

    status("Requesting microphone…");
    mic = await navigator.mediaDevices.getUserMedia({ audio: true });

    pc = new RTCPeerConnection();
    pc.addTrack(mic.getTracks()[0], mic);
    const audioEl = new Audio();
    audioEl.autoplay = true;
    pc.ontrack = (e) => { audioEl.srcObject = e.streams[0]; };
    dc = pc.createDataChannel("oai-events");
    dc.onmessage = (e) => handleEvent(JSON.parse(e.data), tools);
    dc.onopen = () => {
      // Register every fleet tool as a Realtime function tool.
      dc.send(JSON.stringify({
        type: "session.update",
        session: {
          type: "realtime",
          tools: tools.map((t) => ({
            type: "function",
            name: t.name,
            description: t.description || t.title || t.name,
            parameters: t.inputSchema,
          })),
        },
      }));
      status("Live. Say something.");
      $("orb").classList.add("live");
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    const sdp = await fetch(`https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(model)}`, {
      method: "POST",
      headers: { Authorization: `Bearer ${ephemeral}`, "Content-Type": "application/sdp" },
      body: offer.sdp,
    });
    if (!sdp.ok) throw new Error(`Realtime SDP exchange failed: ${sdp.status}`);
    await pc.setRemoteDescription({ type: "answer", sdp: await sdp.text() });
    logSession = `web-${Date.now().toString(36)}`;
    log("session_started", { model, tools: tools.map((t) => t.name) });

    $("setup").style.display = "none";
    $("session").style.display = "block";
  } catch (err) {
    status(`Error: ${err.message}`);
    cleanup();
  }
}

async function handleEvent(ev, tools) {
  if (ev.type === "response.output_audio_transcript.delta" || ev.type === "response.audio_transcript.delta") {
    $("orb").classList.add("talking");
    turnText += ev.delta;
    $("transcript").textContent += ev.delta;
    $("transcript").scrollTop = $("transcript").scrollHeight;
  }
  if (ev.type === "response.done") {
    $("orb").classList.remove("talking");
    if (turnText) log("assistant_turn", { text: turnText });
    turnText = "";
    $("transcript").textContent += "\n\n";
  }
  if (ev.type === "response.output_item.done" && ev.item?.type === "function_call") {
    const { name, call_id } = ev.item;
    let args = {};
    try { args = JSON.parse(ev.item.arguments || "{}"); } catch {}
    status(`Tool: ${name}…`);
    log("tool_call", { name, args });
    let output;
    if (CONTROL_TOOLS.has(name) && !(await requestApproval(name, args))) {
      output = "The user denied this action.";
    } else {
      try {
        const result = await mcpRequest("tools/call", { name, arguments: args });
        output = (result?.content || []).map((c) => c.text ?? "").join("\n") || "(empty result)";
      } catch (err) {
        output = `Tool failed: ${err.message}`;
      }
    }
    log("tool_result", { name, output: output.slice(0, 2000) });
    dc.send(JSON.stringify({
      type: "conversation.item.create",
      item: { type: "function_call_output", call_id, output },
    }));
    dc.send(JSON.stringify({ type: "response.create" }));
    status("Live.");
  }
  if (ev.type === "error") {
    log("realtime_error", { error: ev.error });
    status(`Realtime error: ${ev.error?.message || "unknown"}`);
  }
}

function cleanup() {
  mic?.getTracks().forEach((t) => t.stop());
  pc?.close();
  pc = dc = mic = undefined;
  $("orb").classList.remove("live", "talking");
  $("setup").style.display = "block";
  $("session").style.display = "none";
}

$("connect").onclick = connect;
$("hangup").onclick = () => { cleanup(); status("Disconnected."); };
$("mute").onclick = () => {
  const track = mic?.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  $("mute").textContent = track.enabled ? "Mute" : "Unmute";
};
</script>
</body>
</html>
