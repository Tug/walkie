name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format (Biome)
        run: bunx biome ci .

      - name: Typecheck
        run: bunx tsc

      - name: Tests
        run: bun test

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: mobile
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: mobile
        run: bunx tsc --noEmit
